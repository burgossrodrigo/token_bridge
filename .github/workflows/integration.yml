name: Integration Tests

on:
  push:
    branches-ignore:
      - main
      - dev
  pull_request:
    branches-ignore:
      - main
      - dev

jobs:
  # ── Ethereum ────────────────────────────────────────────────────────────────
  ethereum:
    name: Ethereum (Hardhat)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run integration tests
        run: npx hardhat test --network hardhat

  # ── Solana ──────────────────────────────────────────────────────────────────
  solana:
    name: Solana (Anchor)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: ghcr.io/burgossrodrigo/anchor-build:0.31.1
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: contracts/solana/target
          key: ${{ runner.os }}-anchor-target-${{ hashFiles('contracts/solana/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-anchor-target-

      - name: Install JS dependencies
        working-directory: contracts/solana
        run: yarn install

      - name: Generate throwaway keypair
        run: solana-keygen new --outfile /root/.config/solana/id.json --no-bip39-passphrase --force

      - name: Fix blake3 compatibility
        working-directory: contracts/solana
        run: cargo update -p blake3 --precise 1.8.2

      - name: Fix indexmap compatibility (bundled rustc 1.79)
        working-directory: contracts/solana
        run: cargo update -p indexmap --precise 2.11.4

      - name: Build and test
        working-directory: contracts/solana
        run: anchor test
